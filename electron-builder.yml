# Bundle id: com.mira.app was arbitrary AND is already registered to another Apple
# team (Apple refuses to register it to ours), so it can't carry a provisioning
# profile. com.mickaelfm.mira is registrable under the free personal team ZMKDR6H89Y,
# which is required for the WebAuthn keychain-access-groups entitlement (webauthn.ts).
appId: com.mickaelfm.mira
productName: Mira
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # The native location addon ships as a resource (extraResources), not in the
  # asar — keep its whole source/build tree out of the app bundle.
  - '!native'
# Ship the compiled macOS location addon into Contents/Resources so the main
# process loads it by absolute path (see src/main/mac-location.ts). It is a signed
# nested Mach-O; electron-builder re-signs it with the app's certificate.
extraResources:
  - from: native/mira-location/build/Release/mira_location.node
    to: mira_location.node
  # Same deal for the Spaces addon (macOS virtual desktops, see src/main/spaces.ts).
  - from: native/mira-spaces/build/Release/mira_spaces.node
    to: mira_spaces.node
  # Same deal for the activation addon (suppress background reload foregrounding,
  # see src/main/mac-activation.ts).
  - from: native/mira-activation/build/Release/mira_activation.node
    to: mira_activation.node
asarUnpack:
  - resources/**
# Declare Mira a handler for local HTML files so `open foo.html` (and a
# double-click in Finder) routes the file to Mira via the 'open-file' event
# (see src/main/index.ts). electron-builder expands this into CFBundleDocumentTypes
# in Info.plist. rank 'Default' offers Mira as a candidate handler; the user must
# still pick it once (Finder → Open With → Mira → Always) — declaring it does not
# seize the association from Safari/Chrome. macOS only honors this for the
# packaged bundle, never for `npm run dev`.
fileAssociations:
  - ext: html
    name: HTML Document
    role: Viewer
    rank: Default
  - ext: htm
    name: HTML Document
    role: Viewer
    rank: Default
win:
  executableName: mira
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  # Development signing (not distribution): Mira is a personal, non-distributed build,
  # and only a development-signed app with an embedded provisioning profile can carry the
  # AMFI-restricted keychain-access-groups entitlement (WebAuthn Touch ID, see webauthn.ts).
  # `type: development` makes electron-builder accept the "Apple Development" cert; without
  # it, it looks for a "Developer ID Application" cert we don't have. identity pins that
  # exact cert. provisioningProfile is minted from the free personal team (ZMKDR6H89Y) and
  # EXPIRES 7 DAYS after creation — re-mint + rebuild weekly (see build/embedded.provisionprofile).
  type: development
  identity: "Apple Development: faivrem@gmail.com (23L76N6978)"
  provisioningProfile: build/embedded.provisionprofile
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # extendInfo must be a MAP, not a list: electron-builder's list form mangles a
  # nested value (CFBundleURLTypes landed under a bogus numeric key). Map form
  # merges each key into Info.plist at the top level as intended.
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    # Required for geolocation: Chromium on macOS gets a position from CoreLocation
    # (the OS location service), and macOS refuses to hand a location to an app that
    # does not declare this usage string — the symptom is a site reporting "precise
    # location could not be determined" even after the permission is granted.
    NSLocationWhenInUseUsageDescription: Mira shares your location with websites that request it, so maps and local results work.
    NSLocationUsageDescription: Mira shares your location with websites that request it, so maps and local results work.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
    # Declare Mira a web browser: it handles http/https URL schemes, so macOS lists
    # it in the default-browser picker and routes clicked links to the 'open-url'
    # event (see src/main/index.ts). Without this, Mira can't be set as default.
    CFBundleURLTypes:
      - CFBundleURLName: com.mickaelfm.mira.web
        CFBundleTypeRole: Viewer
        CFBundleURLSchemes:
          - http
          - https
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
